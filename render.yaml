services:
  - type: web
    name: lms-backend
    runtime: image
    image:
      url: mcwein/lms-backend:latest
    envVars:
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost"
      - key: CORS_ORIGINS
        value: "https://lms-frontend.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString

  - type: web
    name: lms-frontend
    runtime: image
    image:
      url: mcwein/lms-frontend:latest
    envVars:
      - key: BACKEND_URL
        value: "https://lms-backend.onrender.com"

databases:
  - name: lms-db
    plan: free
    databaseName: lms
    user: lms_user
