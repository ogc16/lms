name: lms
region: nyc
services:
  - name: backend
    github:
      branch: master
      deploy_on_push: true
      repo: ogc16/lms
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: DJANGO_SECRET_KEY
        type: SECRET
        value: ""
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".ondigitalocean.app,localhost"
      - key: CORS_ORIGINS
        value: "https://frontend.ondigitalocean.app"
    alerts:
      - rule: DEPLOYMENT_FAILED

  - name: frontend
    github:
      branch: master
      deploy_on_push: true
      repo: ogc16/lms
    dockerfile_path: frontend/Dockerfile
    http_port: 80
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: BACKEND_URL
        value: "http://backend"
    alerts:
      - rule: DEPLOYMENT_FAILED

databases:
  - name: lms-db
    engine: PG
    production: false
    db_name: lms
